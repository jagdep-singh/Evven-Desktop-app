name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Build macOS App
        shell: bash
        run: |
          npx pake https://evven.xyz/desktop \
            --name "Evven" \
            --icon assets/evven-icon.png \
            --targets app

      - name: Locate App Bundle
        id: app
        shell: bash
        run: |
          APP=$(find . -name "Evven.app" | head -n1)
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        shell: bash
        run: |
          hdiutil create \
            -volname "Evven" \
            -srcfolder "${{ steps.app.outputs.app }}" \
            -ov \
            -format UDZO \
            "Evven-${{ github.ref_name }}-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: |
            Evven-*.dmg
            **/*.app

  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows
        shell: bash
        run: |
          npx pake https://evven.xyz/desktop \
            --name "Evven" \
            --icon assets/evven-icon.png \
            --targets x64

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            **/*.exe
            **/*.msi

  linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Dependencies
        run: npm ci

      - name: Build AppImage
        shell: bash
        run: |
          npx pake https://evven.xyz/desktop \
            --name "Evven" \
            --icon assets/evven-icon.png \
            --targets appimage

      - name: Build DEB
        shell: bash
        run: |
          npx pake https://evven.xyz/desktop \
            --name "Evven" \
            --icon assets/evven-icon.png \
            --targets deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            **/*.AppImage
            **/*.deb